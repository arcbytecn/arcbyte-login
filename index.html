<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login to ArcByte</title>

<link rel="icon" href="./logos/favicon.png">

<!-- Google Login SDK -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
margin:0;
min-height:100vh;
background:url("./images/bglight.png") no-repeat center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.signin-card{
width:100%;
max-width:380px;
background:#fff;
border-radius:6px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
text-align:center;
}

.logo img{
max-width:95px;
margin-bottom:18px;
}

h1{
font-size:18px;
font-weight:650;
margin:0 0 6px;
color:#111;
}

.subtitle{
font-size:12px;
color:#666;
margin-bottom:20px;
}

/* OAuth buttons */

.oauth-buttons{
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:12px;
}

.oauth-btn{
width:100%;
padding:9px;
font-size:13px;
border-radius:4px;
border:1px solid #ccc;
background:#fff;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.oauth-btn:hover{
background:#f5f5f5;
}

.oauth-btn img{
width:16px;
height:16px;
}

.oauth-divider{
display:flex;
align-items:center;
margin:18px 0;
font-size:12px;
color:#777;
}

.oauth-divider:before,
.oauth-divider:after{
content:"";
flex:1;
height:1px;
background:#ddd;
}

.oauth-divider span{
padding:0 10px;
}

input{
width:100%;
padding:9px;
font-size:13px;
border-radius:4px;
border:1px solid #ccc;
margin-bottom:6px;
}

input:focus{
outline:none;
border-color:#0067b8;
}

input.error{
border-color:#d93025;
}

.password-area{
max-height:0;
overflow:hidden;
transition:max-height .35s ease;
}

.password-area.show{
max-height:120px;
}

.error-text{
font-size:12px;
color:#d93025;
text-align:left;
margin-bottom:10px;
display:none;
}

button.primary{
width:100%;
background:#0067b8;
color:white;
border:none;
padding:9px;
font-size:13px;
border-radius:4px;
cursor:pointer;
font-weight:600;
}

button.primary:hover{
background:#005da6;
}

.footer-text{
margin-top:20px;
font-size:11px;
color:#666;
}

.bottom-footer{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
font-size:11px;
color:#666;
}

.bottom-footer a{
color:#666;
text-decoration:none;
margin:0 6px;
}

.copyright{
position:absolute;
bottom:16px;
width:100%;
text-align:center;
font-size:11px;
color:#666;
}

</style>
</head>

<body>

<div class="signin-card">

<div class="logo">
<img src="./images/logo.png">
</div>

<h1>Sign in</h1>
<div class="subtitle">to your ArcByte Account</div>


<!-- GOOGLE LOGIN -->

<div id="g_id_onload"
 data-client_id="12756840974-7aplet1sosop8s7bj8jpvilbqidoj9l9.apps.googleusercontent.com"
 data-context="signin"
 data-ux_mode="popup"
 data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
 data-type="standard"
 data-size="large"
 data-theme="outline"
 data-text="signin_with"
 data-width="320">
</div>


<!-- OTHER LOGIN OPTIONS -->

<div class="oauth-divider">
<span>or</span>
</div>

<input id="username" placeholder="Username">

<div class="password-area" id="passwordArea">

<input id="password" type="password" placeholder="Password">

<div class="error-text" id="errorText">
Incorrect username or password
</div>

</div>

<button class="primary" id="signinBtn">Sign in</button>

<div class="footer-text">
New here? <a href="./signup.html">Create an account</a>
</div>

</div>

<div class="bottom-footer">
<a href="#">Privacy</a>
<a href="#">Terms</a>
<a href="#">Cookies</a>
</div>

<div class="copyright">
© 2026 ArcByte Limited. All Rights Reserved.
</div>


<script>

/* Google login callback */

function handleCredentialResponse(response){

fetch("/auth/google",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
token:response.credential
})
})
.then(res=>res.json())
.then(data=>{

/* redirect after successful login */

window.location.href="https://docs.arcbytecn.com";

})

}


/* OAuth redirect for other providers */

function oauth(provider){
window.location.href="/auth/"+provider;
}


/* Password login demo */

const username=document.getElementById("username");
const password=document.getElementById("password");
const passwordArea=document.getElementById("passwordArea");
const errorText=document.getElementById("errorText");

let expanded=false;
const DEMO_PASSWORD="123456";

username.oninput=()=>{
if(username.value&&!expanded){
passwordArea.classList.add("show");
expanded=true;
}
};

document.getElementById("signinBtn").onclick=()=>{

if(password.value!==DEMO_PASSWORD){

errorText.style.display="block";
password.classList.add("error");
username.classList.add("error");

}else{

/* redirect after password success */

window.location.href="https://docs.arcbytecn.com";

}

};

password.oninput=()=>{
errorText.style.display="none";
password.classList.remove("error");
username.classList.remove("error");
};

</script>

</body>
</html>
